version: 2

updates:
  # Python dependencies — weekly check for security fixes + minor bumps
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/New_York"
    # Throttled to 2 to avoid the "12 PRs at once on enable" flood seen 2026-05-09.
    open-pull-requests-limit: 2
    labels: ["dependencies", "python"]
    # Group GitHub Actions bumps so they arrive as one PR/week, not three.
    groups:
      python-deps:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels: ["dependencies", "github-actions"]
    groups:
      gha:
        patterns: ["*"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels: ["dependencies", "docker"]
