services:
  catastrophe-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: catastrophe-analyzer
    restart: unless-stopped
    command: ["--quiet"]
    environment:
      TZ: ${TZ:-UTC}
      # strict_rules = no Ollama required; agent = requires reachable LLM (see profiles/agent-validation/)
      CATASTROPHE_ENTITY_VALIDATION_MODE: ${CATASTROPHE_ENTITY_VALIDATION_MODE:-agent}
      CATASTROPHE_ENTITY_AGENT_ENDPOINT: ${CATASTROPHE_ENTITY_AGENT_ENDPOINT:-}
      CATASTROPHE_ENTITY_AGENT_API_KEY: ${CATASTROPHE_ENTITY_AGENT_API_KEY:-}
      CATASTROPHE_ENTITY_AGENT_PROVIDER: ${CATASTROPHE_ENTITY_AGENT_PROVIDER:-generic_http}
      CATASTROPHE_ENTITY_AGENT_MODEL: ${CATASTROPHE_ENTITY_AGENT_MODEL:-}
      CATASTROPHE_ENTITY_VALIDATION_RUBRIC_FILE: ${CATASTROPHE_ENTITY_VALIDATION_RUBRIC_FILE:-docs/ENTITY_VALIDATION_RUBRIC.md}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      IBKR_HOST: ${IBKR_HOST:-ib-gateway}
      IBKR_PORT: ${IBKR_PORT:-4004}
      IBKR_CLIENT_ID: ${IBKR_CLIENT_ID:-11}
      CATASTROPHE_EMAIL_PASSWORD: ${CATASTROPHE_EMAIL_PASSWORD:-}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
      # Override RSS User-Agent (SEC and others); defaults in config/settings.json scraping.http_user_agent
      CATASTROPHE_HTTP_USER_AGENT: ${CATASTROPHE_HTTP_USER_AGENT:-}
      # Alert preview toggles for local testing:
      # - CATASTROPHE_LOCAL_ALERT_PREVIEW=1
      # - CATASTROPHE_ALERTS_LOCAL_ONLY=1
    extra_hosts:
      # Linux/WSL2 Docker Engine: lets the container reach Ollama on the host via host.docker.internal
      - "host.docker.internal:host-gateway"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-u", "healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 180s
    networks:
      - default
      - ib-gateway_default
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

networks:
  ib-gateway_default:
    external: true
