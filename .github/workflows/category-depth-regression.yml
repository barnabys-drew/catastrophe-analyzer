name: Category Depth Regression

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  category-depth-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run category depth and yield regression tests
        run: python -m unittest discover -s tests -p "test_*.py"
