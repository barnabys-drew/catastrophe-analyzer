name: Code Security (Semgrep + Spectra)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run Semgrep security scan
        run: |
          pip install semgrep --quiet
          semgrep --config p/security-audit --config p/owasp-top-ten --config p/python \
            --sarif --output semgrep.sarif . || true

      - name: Upload Semgrep results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

      - name: Comment on PR with Semgrep report
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## 🔐 Code Security (Semgrep) Scan Complete\n\nResults uploaded to GitHub Security tab. SARIF file available in artifacts.'
            });

      - name: Upload Semgrep SARIF report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-security-sarif
          path: semgrep.sarif
